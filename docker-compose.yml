services:

  postgres:
    image: postgres:16
    container_name: postgres-assinaturas
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: bd-assinaturas
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: coti
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rede-assinaturas

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-assinaturas
    restart: always
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: coti@email.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - rede-assinaturas

volumes:
  postgres_data:
  pgadmin_data:

networks:
  rede-assinaturas:
    driver: bridge